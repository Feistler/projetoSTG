# Painel web:  docker compose up dashboard   -> http://localhost:8000
# CLI:         docker compose run --rm stg list
#              docker compose run --rm stg scan nmap 192.168.56.10 --report html
services:
  # Painel web (FastAPI) - a forma "software" de operar o STG.
  dashboard:
    build: .
    image: stg-toolkit:latest
    entrypoint: ["stg-web"]
    # Liga apenas ao loopback do host: o scanner NAO deve ficar exposto na rede.
    ports:
      - "127.0.0.1:8000:8000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - path: .env
        required: false
    volumes:
      - ./config:/data/config
      - ./pipelines:/data/pipelines:ro
      - ./stg-data:/data/stg-data

  stg:
    build: .
    image: stg-toolkit:latest
    # Carrega o .env se existir (requer Docker Compose v2.24+).
    env_file:
      - path: .env
        required: false
    # Capabilities para recursos avancados de rede (nmap, captura ao vivo).
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./config:/data/config
      - ./pipelines:/data/pipelines:ro
      - ./stg-data:/data/stg-data
    # Varreduras de rede reais (nmap/suricata) precisam de host networking (Linux):
    # network_mode: host
