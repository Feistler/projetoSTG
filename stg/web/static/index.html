<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STG · Security Toolkit Gateway</title>
<style>
  :root{
    --bg:#0f172a;--card:#1e293b;--card2:#243449;--line:#334155;
    --text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;
    --critical:#dc2626;--high:#ea580c;--medium:#d97706;--low:#2563eb;--info:#475569;
  }
  :root[data-theme="light"]{
    --bg:#f1f5f9;--card:#ffffff;--card2:#f8fafc;--line:#e2e8f0;
    --text:#0f172a;--muted:#64748b;--accent:#0284c7;
  }
  html{transition:background .2s,color .2s}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto;padding:28px 20px 60px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand h1{font-size:1.25rem;margin:0;font-weight:600}
  .brand p{margin:0;color:var(--muted);font-size:.8rem}
  .logo{width:40px;height:40px;border-radius:10px;background:#0c4a6e;display:flex;align-items:center;justify-content:center;font-size:20px}
  .pill{font-size:.78rem;padding:6px 12px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .pill.ok{background:#064e3b;color:#6ee7b7;border-color:#065f46}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .chip{font-size:.82rem;padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}
  .chip.on{background:#0c4a6e;border-color:#0e7490;color:#bae6fd}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
  label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:6px}
  select,input,textarea{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:.92rem;font-family:inherit}
  .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-top:12px}
  button{background:var(--accent);color:#03212f;border:none;border-radius:9px;padding:11px 20px;font-size:.92rem;font-weight:600;cursor:pointer}
  button:disabled{opacity:.55;cursor:not-allowed}
  .hint{font-size:.8rem;color:var(--muted);margin-top:12px;display:flex;gap:7px;align-items:flex-start}
  .mono{font-family:ui-monospace,Consolas,monospace}
  .metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:4px 0 16px}
  .metric{background:var(--card2);border-radius:10px;padding:12px}
  .metric .n{font-size:1.5rem;font-weight:700}
  .metric .l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .status{display:inline-block;padding:4px 12px;border-radius:8px;font-weight:600;font-size:.85rem}
  .st-success{background:#064e3b;color:#6ee7b7}.st-failed{background:#7f1d1d;color:#fecaca}
  .st-unavailable{background:#334155;color:#cbd5e1}.st-unauthorized{background:#7c2d12;color:#fed7aa}
  .st-skipped{background:#334155;color:#cbd5e1}
  .finding{display:flex;gap:12px;align-items:flex-start;padding:12px 4px;border-top:1px solid var(--line)}
  .badge{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:999px;color:#fff;text-transform:uppercase;white-space:nowrap;min-width:64px;text-align:center}
  .b-critical{background:var(--critical)}.b-high{background:var(--high)}.b-medium{background:var(--medium)}
  .b-low{background:var(--low)}.b-info{background:var(--info)}
  .f-title{font-size:.92rem}.f-desc{font-size:.8rem;color:var(--muted)}
  .links a{color:var(--accent);font-size:.82rem;margin-right:14px;text-decoration:none}
  .empty{color:var(--muted);font-style:italic;padding:14px 4px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  .gtoggle{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:400;font-size:.85rem}
  .phase{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px}
  .phase .num{width:30px;height:30px;border-radius:8px;background:#0c4a6e;color:#bae6fd;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
  .phase h3{margin:0 0 5px;font-size:.96rem;display:flex;align-items:center;gap:9px}
  .phase p{margin:3px 0;font-size:.82rem;color:var(--muted)}
  .phase p b{color:var(--text);font-weight:600}
  .phase .tools{font-size:.74rem;color:var(--accent);margin-top:7px}
  .tag{font-size:.62rem;padding:2px 8px;border-radius:999px;font-weight:700;text-transform:uppercase}
  .tag.red{background:#7f1d1d;color:#fecaca}.tag.blue{background:#1e3a8a;color:#bfdbfe}
  .tip{color:var(--accent);display:block;margin-top:5px}
  .nav{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--line)}
  .nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-weight:400;font-size:.9rem;padding:9px 16px;border-radius:0;cursor:pointer}
  .nav-btn.on{color:var(--text);border-bottom-color:var(--accent)}
  .hrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-top:1px solid var(--line);font-size:.86rem}
  .hrow .meta{color:var(--muted);font-size:.77rem}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .tag2{font-size:.64rem;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .tag2.warn{background:#7c2d12;color:#fed7aa;border-color:transparent}
  .tag2.ok{background:#064e3b;color:#6ee7b7;border-color:transparent}
  #themeBtn{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:400;font-size:1rem;padding:5px 10px;line-height:1;border-radius:999px}
  #toasts{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:50;max-width:300px}
  .toast{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:10px 14px;font-size:.85rem;animation:slidein .25s ease}
  .toast.ok{border-left-color:#10b981}.toast.err{border-left-color:#ef4444}
  @keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  @media(max-width:680px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){
    .wrap{padding:18px 14px 50px}
    header{flex-direction:column;align-items:flex-start}
    .nav{overflow-x:auto}
    .metrics{grid-template-columns:repeat(2,1fr)}
    .row{flex-direction:column;align-items:stretch}
    .row button{width:100%}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bae6fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg></div>
      <div><h1>STG · Security Toolkit Gateway</h1><p>Painel de operações de segurança</p></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="scope" class="pill">escopo: carregando…</div>
      <button id="themeBtn" title="Alternar tema claro/escuro" aria-label="Alternar tema">☀️</button>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn on" data-view="operar">Operar</button>
    <button class="nav-btn" data-view="history">Histórico</button>
    <button class="nav-btn" data-view="audit">Auditoria</button>
  </nav>

  <section id="view-operar">
  <div class="chips" id="chips"></div>

  <div style="margin-bottom:16px">
    <button class="gtoggle" id="guideToggle">📚 Metodologia: recon → vuln → web → senhas → rede → SIEM</button>
    <div id="guide" style="display:none;margin-top:12px"></div>
  </div>

  <div class="card">
    <div class="grid">
      <div>
        <label for="connector">Ferramenta</label>
        <select id="connector"></select>
      </div>
      <div>
        <label for="target">Alvo</label>
        <input id="target" placeholder="ex.: scanme.nmap.org" value="scanme.nmap.org">
      </div>
    </div>
    <div class="row">
      <div style="flex:1;min-width:220px">
        <label for="opts">Opções (chave=valor, separadas por ;)</label>
        <input id="opts" class="mono" placeholder="ex.: top_ports=1000; service_detection=true">
      </div>
      <label style="display:flex;align-items:center;gap:7px;color:var(--text);font-size:.85rem;margin:0 4px 6px 0">
        <input type="checkbox" id="force" style="width:auto"> forçar (audita)
      </label>
      <button id="run">Executar</button>
    </div>
    <div class="hint" id="desc"></div>
  </div>

  <div id="output"></div>
  </section>

  <section id="view-history" style="display:none"></section>
  <section id="view-audit" style="display:none"></section>
</div>
<div id="toasts"></div>

<script>
const SEV = ["critical","high","medium","low","info"];
let CONNECTORS = [], filterCat = "todos";

async function api(path, opts){ const r = await fetch(path, opts); if(!r.ok){ throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);} return r.json(); }

async function loadScope(){
  try{
    const s = await api("/api/scope");
    const el = document.getElementById("scope");
    const total = s.networks.length + s.domains.length;
    if(s.configured){ el.className="pill ok"; el.textContent = "escopo: "+total+" alvo(s) autorizado(s)"; }
    else { el.className="pill"; el.textContent = "escopo: não definido (tudo ativo bloqueado)"; }
  }catch(e){ document.getElementById("scope").textContent = "escopo: erro"; }
}

function buildChips(){
  const cats = ["todos", ...new Set(CONNECTORS.map(c=>c.category))];
  const box = document.getElementById("chips");
  box.innerHTML = "";
  cats.forEach(cat=>{
    const b = document.createElement("button");
    b.className = "chip" + (cat===filterCat?" on":"");
    b.textContent = cat;
    b.onclick = ()=>{ filterCat = cat; buildChips(); fillConnectors(); };
    box.appendChild(b);
  });
}

function fillConnectors(){
  const sel = document.getElementById("connector");
  sel.innerHTML = "";
  const list = CONNECTORS.filter(c=> filterCat==="todos" || c.category===filterCat);
  list.forEach(c=>{
    const o = document.createElement("option");
    o.value = c.name;
    o.textContent = c.tool + (c.available ? "" : "  (indisponível)");
    sel.appendChild(o);
  });
  onConnectorChange();
}

function current(){ return CONNECTORS.find(c=>c.name===document.getElementById("connector").value); }

function onConnectorChange(){
  const c = current(); if(!c) return;
  const types = c.target_types.length ? c.target_types.join(", ") : "qualquer";
  let txt = c.description + "  ·  alvos: " + types;
  if(!c.available) txt += "  ·  ⚠ " + (c.reason||"indisponível");
  let html = "<span>ℹ️</span><span>"+esc(txt);
  if(c.tip) html += '<span class="tip">💡 '+esc(c.tip)+'</span>';
  document.getElementById("desc").innerHTML = html+"</span>";
}

async function runScan(){
  const btn = document.getElementById("run");
  const connector = document.getElementById("connector").value;
  const target = document.getElementById("target").value.trim();
  if(!target){ alert("Informe um alvo."); return; }
  const options = {};
  document.getElementById("opts").value.split(";").forEach(p=>{
    const i = p.indexOf("="); if(i>0){ let v=p.slice(i+1).trim(); const k=p.slice(0,i).trim();
      if(v==="true")v=true; else if(v==="false")v=false; else if(/^-?\d+$/.test(v))v=parseInt(v);
      options[k]=v; }
  });
  const force = document.getElementById("force").checked;
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Executando…';
  document.getElementById("output").innerHTML = '<div class="card" style="color:var(--accent)"><span class="spin"></span> <span style="color:var(--text)">Executando <strong>'+esc(connector)+'</strong> em <strong>'+esc(target)+'</strong>…</span></div>';
  try{
    const res = await api("/api/scan", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({connector, target, options, force})});
    render(res);
    if(res.status==="success") toast("Scan concluído — "+res.findings.length+" achado(s).","ok");
    else if(res.status==="unauthorized") toast("Bloqueado: alvo fora do escopo.","err");
    else if(res.status==="failed") toast("Falhou: "+(res.error||"erro"),"err");
    else toast("Status: "+res.status,"");
  }catch(e){ document.getElementById("output").innerHTML = '<div class="card"><span class="status st-failed">ERRO</span> '+esc(e.message)+'</div>'; toast("Erro: "+e.message,"err"); }
  finally{ btn.disabled = false; btn.textContent = "Executar"; }
}

function render(res){
  const counts = {critical:0,high:0,medium:0,low:0,info:0};
  res.findings.forEach(f=>counts[f.severity]++);
  const sevSorted = [...res.findings].sort((a,b)=>SEV.indexOf(a.severity)-SEV.indexOf(b.severity));
  const metrics = `<div class="metrics">
    <div class="metric"><div class="n">${res.findings.length}</div><div class="l">total</div></div>
    ${SEV.map(s=>`<div class="metric"><div class="n">${counts[s]}</div><div class="l">${s}</div></div>`).join("")}
  </div>`;
  const rows = sevSorted.length ? sevSorted.map(f=>`
    <div class="finding"><span class="badge b-${f.severity}">${f.severity}</span>
    <div><div class="f-title">${esc(f.title)}</div><div class="f-desc">${esc(f.description||f.evidence||"")}</div></div></div>`).join("")
    : '<div class="empty">Nenhum achado.</div>';
  const cmd = res.command ? `<div class="hint mono"><span>$</span><span>${esc(res.command)}</span></div>` : "";
  const links = `<div class="links" style="margin-top:14px">Relatório:
    <a href="/api/report/${res.id}?format=html" target="_blank">HTML</a>
    <a href="/api/report/${res.id}?format=json" target="_blank">JSON</a>
    <a href="/api/report/${res.id}?format=md" target="_blank">Markdown</a></div>`;
  document.getElementById("output").innerHTML = `<div class="card">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">
      <span class="status st-${res.status}">${res.status.toUpperCase()}</span>
      <strong>${esc(res.connector)}</strong><span style="color:var(--muted)">→ ${esc(res.target)}</span>
      ${res.error?'<span style="color:#fecaca;font-size:.82rem">'+esc(res.error)+'</span>':''}
    </div>${cmd}${metrics}${rows}${res.findings.length?links:""}</div>`;
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  try{ localStorage.setItem("stg-theme", t); }catch(e){}
  document.getElementById("themeBtn").textContent = t==="dark" ? "☀️" : "🌙";
}
function toast(msg, kind){
  const el = document.createElement("div");
  el.className = "toast" + (kind ? " "+kind : "");
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; setTimeout(()=>el.remove(), 300); }, 4000);
}

async function loadGuide(){
  try{
    const data = await api("/api/guide");
    document.getElementById("guide").innerHTML = data.map(g=>`
      <div class="phase"><div class="num">${g.ordem}</div><div>
        <h3>${esc(g.titulo)} <span class="tag ${String(g.time).indexOf('Red')>=0?'red':'blue'}">${esc(g.time)}</span></h3>
        <p>${esc(g.resumo)}</p>
        <p><b>Objetivo:</b> ${esc(g.objetivo)}</p>
        <p><b>Como ler:</b> ${esc(g.como_ler)}</p>
        <div class="tools">${g.ferramentas.map(esc).join(" · ")}</div>
      </div></div>`).join("");
  }catch(e){}
}

function statusColor(s){ return ({success:"#10b981",failed:"#ef4444",unavailable:"#64748b",unauthorized:"#f97316",skipped:"#64748b",partial:"#d97706"})[s]||"#64748b"; }
function fmtTime(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleString(); }catch(e){ return iso; } }

function switchView(name){
  ["operar","history","audit"].forEach(v=>{ document.getElementById("view-"+v).style.display = v===name?"block":"none"; });
  document.querySelectorAll(".nav-btn").forEach(b=> b.classList.toggle("on", b.dataset.view===name));
  if(name==="history") loadHistory();
  if(name==="audit") loadAudit();
}

async function loadHistory(){
  const v = document.getElementById("view-history");
  try{
    const data = await api("/api/history");
    if(!data.length){ v.innerHTML='<div class="empty">Nenhum scan nesta sessão ainda — rode um em “Operar”.</div>'; return; }
    v.innerHTML = data.map(h=>`<div class="hrow"><span class="dot" style="background:${statusColor(h.status)}"></span>
      <div style="flex:1"><strong>${esc(h.connector)}</strong> <span class="meta">→ ${esc(h.target)}</span>
      <div class="meta">${h.total} achado(s) · ${esc(h.status)} · ${fmtTime(h.finished_at)}</div></div>
      <div class="links"><a href="/api/report/${h.id}?format=html" target="_blank">HTML</a><a href="/api/report/${h.id}?format=json" target="_blank">JSON</a></div></div>`).join("");
  }catch(e){ v.innerHTML='<div class="empty">Erro ao carregar histórico.</div>'; }
}

async function loadAudit(){
  const v = document.getElementById("view-audit");
  try{
    const data = await api("/api/audit?limit=150");
    if(!data.length){ v.innerHTML='<div class="empty">Trilha de auditoria vazia.</div>'; return; }
    v.innerHTML = '<div class="meta" style="margin-bottom:10px">'+data.length+' evento(s) · mais recentes primeiro</div>' + data.map(a=>{
      const blocked = a.event==="blocked";
      const color = blocked ? "#ef4444" : statusColor(a.status);
      const tags = [];
      if(blocked) tags.push('<span class="tag2 warn">bloqueado</span>');
      if(a.forced) tags.push('<span class="tag2 warn">forçado</span>');
      if(a.authorized===false && !blocked) tags.push('<span class="tag2 warn">fora do escopo</span>');
      if(a.authorized===true) tags.push('<span class="tag2 ok">autorizado</span>');
      return '<div class="hrow"><span class="dot" style="background:'+color+'"></span>'
        +'<div style="flex:1"><strong>'+esc(a.connector||a.event||"")+'</strong> <span class="meta">→ '+esc(a.target||"")+'</span>'
        +'<div class="meta">'+fmtTime(a.timestamp)+' · '+esc(a.user||"")+(a.status?(" · "+esc(a.status)):"")+'</div></div>'
        +'<div style="display:flex;gap:5px">'+tags.join("")+'</div></div>';
    }).join("");
  }catch(e){ v.innerHTML='<div class="empty">Erro ao carregar auditoria.</div>'; }
}

(async function init(){
  document.getElementById("connector").onchange = onConnectorChange;
  document.getElementById("run").onclick = runScan;
  document.getElementById("guideToggle").onclick = ()=>{ const el=document.getElementById("guide"); el.style.display = el.style.display==="none"?"block":"none"; };
  document.querySelectorAll(".nav-btn").forEach(b=> b.onclick=()=>switchView(b.dataset.view));
  let savedTheme = "dark"; try{ savedTheme = localStorage.getItem("stg-theme") || "dark"; }catch(e){}
  applyTheme(savedTheme);
  document.getElementById("themeBtn").onclick = ()=> applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark");
  await loadScope();
  await loadGuide();
  CONNECTORS = await api("/api/connectors");
  buildChips(); fillConnectors();
})();
</script>
</body>
</html>
