<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STG · Security Toolkit Gateway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070e;--panel:#0b1222;--panel2:#0e1730;--line:rgba(0,229,255,.18);--line2:rgba(0,229,255,.35);
    --text:#cfe9f5;--muted:#6f8296;--accent:#00e5ff;--accent2:#ff2bd6;
    --crit:#ff2e6e;--high:#ff8a00;--med:#ffd400;--low:#21c7ff;--info:#637088;
    --glow:0 0 12px rgba(0,229,255,.35);
    --font-head:'Orbitron','Segoe UI',sans-serif;--font-mono:'Share Tech Mono',ui-monospace,Consolas,monospace;
    --font-body:-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  :root[data-theme="light"]{
    --bg:#eef2f7;--panel:#ffffff;--panel2:#f5f8fc;--line:rgba(8,145,178,.25);--line2:rgba(8,145,178,.45);
    --text:#0b1222;--muted:#5b6b7d;--accent:#0891b2;--accent2:#be185d;--glow:none;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--text);font-family:var(--font-body);line-height:1.5;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(0,229,255,.07), transparent 55%),
      linear-gradient(rgba(0,229,255,.035) 1px, transparent 1px) 0 0/44px 44px,
      linear-gradient(90deg, rgba(0,229,255,.035) 1px, transparent 1px) 0 0/44px 44px,
      var(--bg);
    background-attachment:fixed;min-height:100vh;transition:background .25s,color .25s}
  :root[data-theme="light"] body{background:radial-gradient(ellipse at 50% -10%, rgba(8,145,178,.08), transparent 55%),var(--bg)}
  .wrap{max-width:1040px;margin:0 auto;padding:26px 20px 70px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{width:44px;height:44px;border-radius:9px;background:var(--panel2);border:1px solid var(--line2);
    display:flex;align-items:center;justify-content:center;box-shadow:var(--glow)}
  .brand h1{font-family:var(--font-head);font-size:1.22rem;margin:0;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;text-shadow:var(--glow)}
  .brand p{margin:2px 0 0;color:var(--muted);font-size:.72rem;font-family:var(--font-mono);letter-spacing:1px}
  .pill{font-size:.72rem;padding:6px 13px;border-radius:999px;border:1px solid var(--line);color:var(--muted);
    font-family:var(--font-mono);display:inline-flex;align-items:center;gap:7px}
  .pill .led{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .pill.ok{border-color:rgba(0,255,156,.4);color:#00ff9c}.pill.ok .led{background:#00ff9c;box-shadow:0 0 8px #00ff9c}
  .pill.bad{border-color:rgba(255,46,110,.5);color:var(--crit)}.pill.bad .led{background:var(--crit);box-shadow:0 0 8px var(--crit)}
  #themeBtn{background:transparent;border:1px solid var(--line);color:var(--muted);font-size:1rem;padding:6px 11px;line-height:1;border-radius:999px;cursor:pointer}
  .nav{display:flex;gap:2px;margin-bottom:22px;border-bottom:1px solid var(--line)}
  .nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);
    font-family:var(--font-head);font-weight:500;font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;
    padding:11px 18px;border-radius:0;cursor:pointer}
  .nav-btn.on{color:var(--accent);border-bottom-color:var(--accent);text-shadow:var(--glow)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:16px;
    box-shadow:inset 0 0 30px rgba(0,229,255,.03)}
  label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:7px;font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase}
  select,input,textarea{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:6px;
    padding:11px 13px;font-size:.92rem;font-family:var(--font-mono)}
  select:focus,input:focus{outline:none;border-color:var(--line2);box-shadow:var(--glow)}
  .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
  .frow{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-top:12px}
  button.run{background:var(--accent);color:#021016;border:none;border-radius:6px;padding:12px 22px;font-family:var(--font-head);
    font-size:.82rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;box-shadow:var(--glow)}
  button.run:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
  .gtoggle{background:transparent;border:1px solid var(--line);color:var(--muted);font-size:.82rem;font-family:var(--font-mono);
    padding:9px 13px;border-radius:6px;cursor:pointer;width:100%;text-align:left}
  .hint{font-size:.78rem;color:var(--muted);margin-top:12px;display:flex;gap:8px;align-items:flex-start;font-family:var(--font-mono)}
  .tip{color:var(--accent);display:block;margin-top:6px}
  .mono{font-family:var(--font-mono)}
  .metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:14px 0}
  .metric{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:13px;cursor:pointer;transition:.15s}
  .metric:hover{border-color:var(--line2)}.metric.on{border-color:var(--accent);box-shadow:var(--glow)}
  .metric .n{font-size:1.5rem;font-weight:700;font-family:var(--font-head)}
  .metric .l{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--font-mono)}
  .sevbar{display:flex;height:8px;border-radius:6px;overflow:hidden;margin:2px 0 16px;background:var(--panel2);border:1px solid var(--line)}
  .sevbar span{display:block;height:100%}
  .status{display:inline-block;padding:4px 13px;border-radius:5px;font-weight:700;font-size:.74rem;font-family:var(--font-head);letter-spacing:1.5px}
  .st-success{background:rgba(0,255,156,.12);color:#00ff9c;border:1px solid rgba(0,255,156,.4)}
  .st-failed{background:rgba(255,46,110,.12);color:var(--crit);border:1px solid rgba(255,46,110,.4)}
  .st-unavailable,.st-skipped,.st-partial{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .st-unauthorized{background:rgba(255,138,0,.12);color:var(--high);border:1px solid rgba(255,138,0,.4)}
  .cmd{font-family:var(--font-mono);font-size:.8rem;color:var(--muted);background:var(--bg);border:1px solid var(--line);
    border-radius:6px;padding:9px 12px;margin:10px 0;overflow-x:auto;white-space:nowrap}
  .cmd b{color:var(--accent)}
  .finding{display:flex;gap:13px;align-items:flex-start;padding:12px 4px;border-top:1px solid var(--line)}
  .badge{font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:4px;text-transform:uppercase;white-space:nowrap;
    min-width:66px;text-align:center;font-family:var(--font-mono);letter-spacing:.5px}
  .b-critical{background:rgba(255,46,110,.15);color:var(--crit);border:1px solid var(--crit)}
  .b-high{background:rgba(255,138,0,.15);color:var(--high);border:1px solid var(--high)}
  .b-medium{background:rgba(255,212,0,.12);color:var(--med);border:1px solid var(--med)}
  .b-low{background:rgba(33,199,255,.12);color:var(--low);border:1px solid var(--low)}
  .b-info{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .f-title{font-size:.92rem}.f-desc{font-size:.79rem;color:var(--muted);font-family:var(--font-mono)}
  .links a{color:var(--accent);font-size:.8rem;margin-right:14px;text-decoration:none;font-family:var(--font-mono)}
  .links a:hover{text-shadow:var(--glow)}
  .empty{color:var(--muted);font-style:italic;padding:14px 4px;font-family:var(--font-mono)}
  .phase{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px}
  .phase .num{width:32px;height:32px;border-radius:6px;background:var(--panel2);border:1px solid var(--line2);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-head);flex-shrink:0;box-shadow:var(--glow)}
  .phase h3{margin:0 0 5px;font-size:.95rem;display:flex;align-items:center;gap:9px;font-family:var(--font-head);letter-spacing:.5px}
  .phase p{margin:3px 0;font-size:.81rem;color:var(--muted)}.phase p b{color:var(--text)}
  .phase .tools{font-size:.73rem;color:var(--accent);margin-top:7px;font-family:var(--font-mono)}
  .tag{font-size:.6rem;padding:2px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;font-family:var(--font-mono);letter-spacing:.5px}
  .tag.red{background:rgba(255,46,110,.15);color:var(--crit);border:1px solid var(--crit)}
  .tag.blue{background:rgba(33,199,255,.12);color:var(--low);border:1px solid var(--low)}
  .hrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-top:1px solid var(--line);font-size:.85rem}
  .hrow .meta{color:var(--muted);font-size:.75rem;font-family:var(--font-mono)}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .tag2{font-size:.62rem;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap;font-family:var(--font-mono)}
  .tag2.warn{background:rgba(255,138,0,.14);color:var(--high);border-color:var(--high)}
  .tag2.ok{background:rgba(0,255,156,.12);color:#00ff9c;border-color:rgba(0,255,156,.4)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes s{to{transform:rotate(360deg)}}
  #toasts{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:50;max-width:320px}
  .toast{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;
    padding:11px 15px;font-size:.84rem;font-family:var(--font-mono);box-shadow:var(--glow);animation:sl .25s ease}
  .toast.ok{border-left-color:#00ff9c}.toast.err{border-left-color:var(--crit)}
  @keyframes sl{from{transform:translateX(12px);opacity:0}to{transform:none;opacity:1}}
  @media(max-width:680px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.wrap{padding:18px 14px 50px}header{flex-direction:column;align-items:flex-start}
    .nav{overflow-x:auto}.metrics{grid-template-columns:repeat(2,1fr)}.frow{flex-direction:column;align-items:stretch}.frow button.run{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg></div>
      <div><h1>STG</h1><p>security toolkit gateway</p></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="scope" class="pill"><span class="led"></span> escopo</div>
      <button id="themeBtn" title="Alternar tema" aria-label="Alternar tema">☀</button>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn on" data-view="operar">Operar</button>
    <button class="nav-btn" data-view="history">Histórico</button>
    <button class="nav-btn" data-view="audit">Auditoria</button>
  </nav>

  <section id="view-operar">
    <div style="margin-bottom:16px">
      <button class="gtoggle" id="guideToggle">// metodologia: recon → vuln → web → senhas → rede → siem</button>
      <div id="guide" style="display:none;margin-top:12px"></div>
    </div>

    <div class="panel">
      <div class="grid">
        <div><label>Ferramenta</label><select id="connector"></select></div>
        <div><label>Alvo</label><input id="target" placeholder="ex.: scanme.nmap.org" value="scanme.nmap.org"></div>
      </div>
      <div class="frow">
        <div style="flex:1;min-width:220px"><label>Opções (chave=valor; ...)</label>
          <input id="opts" placeholder="ex.: top_ports=1000; service_detection=true"></div>
        <button class="run" id="run">Executar</button>
      </div>
      <div class="hint" id="desc"></div>
    </div>

    <div id="output"></div>
  </section>

  <section id="view-history" style="display:none"></section>
  <section id="view-audit" style="display:none"></section>
</div>
<div id="toasts"></div>

<script>
const SEV = ["critical","high","medium","low","info"];
const SEVHEX = {critical:"#ff2e6e",high:"#ff8a00",medium:"#ffd400",low:"#21c7ff",info:"#637088"};
let CONNECTORS = [], filterCat = "todos", lastResult = null, sevFilter = "all";

async function api(path, opts){ const r = await fetch(path, opts); if(!r.ok){ throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);} return r.json(); }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtTime(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleString(); }catch(e){ return iso; } }

function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  try{ localStorage.setItem("stg-theme", t); }catch(e){}
  document.getElementById("themeBtn").textContent = t==="dark" ? "☀" : "☾";
}
function toast(msg, kind){
  const el = document.createElement("div");
  el.className = "toast" + (kind ? " "+kind : ""); el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; setTimeout(()=>el.remove(), 300); }, 4200);
}

async function loadScope(){
  const el = document.getElementById("scope");
  try{
    const s = await api("/api/scope"); const total = s.networks.length + s.domains.length;
    if(s.configured){ el.className="pill ok"; el.innerHTML='<span class="led"></span> escopo: '+total+' alvo(s)'; }
    else { el.className="pill"; el.innerHTML='<span class="led"></span> escopo: não definido'; }
  }catch(e){ el.className="pill bad"; el.innerHTML='<span class="led"></span> backend offline'; }
}

function buildChips(){ /* categorias viram filtro do dropdown */ }

function fillConnectors(){
  const sel = document.getElementById("connector"); sel.innerHTML = "";
  const cats = [...new Set(CONNECTORS.map(c=>c.category))];
  cats.forEach(cat=>{
    const g = document.createElement("optgroup"); g.label = cat.toUpperCase();
    CONNECTORS.filter(c=>c.category===cat).forEach(c=>{
      const o = document.createElement("option"); o.value=c.name;
      o.textContent = c.tool + (c.available ? "" : "  ◦ indisponível"); g.appendChild(o);
    });
    sel.appendChild(g);
  });
  onConnectorChange();
}
function current(){ return CONNECTORS.find(c=>c.name===document.getElementById("connector").value); }
function onConnectorChange(){
  const c = current(); if(!c) return;
  const types = c.target_types.length ? c.target_types.join(", ") : "qualquer";
  let txt = c.description + "  ·  alvos: " + types;
  if(!c.available) txt += "  ·  ⚠ " + (c.reason||"indisponível");
  let html = "<span>▍</span><span>"+esc(txt);
  if(c.tip) html += '<span class="tip">↳ '+esc(c.tip)+'</span>';
  document.getElementById("desc").innerHTML = html+"</span>";
}

async function runScan(){
  const btn = document.getElementById("run");
  const connector = document.getElementById("connector").value;
  const target = document.getElementById("target").value.trim();
  if(!target){ toast("Informe um alvo.","err"); return; }
  const options = {};
  document.getElementById("opts").value.split(";").forEach(p=>{
    const i=p.indexOf("="); if(i>0){ let v=p.slice(i+1).trim(); const k=p.slice(0,i).trim();
      if(v==="true")v=true; else if(v==="false")v=false; else if(/^-?\d+$/.test(v))v=parseInt(v); options[k]=v; }
  });
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>scan…';
  document.getElementById("output").innerHTML='<div class="panel" style="color:var(--accent)"><span class="spin"></span> <span style="color:var(--text);font-family:var(--font-mono)">executando '+esc(connector)+' → '+esc(target)+' …</span></div>';
  try{
    const res = await api("/api/scan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({connector,target,options})});
    render(res);
    if(res.status==="success") toast("Scan concluído — "+res.findings.length+" achado(s).","ok");
    else if(res.status==="unauthorized") toast("Bloqueado: fora do escopo.","err");
    else if(res.status==="failed") toast("Falhou: "+(res.error||"erro"),"err");
    else toast("Status: "+res.status,"");
  }catch(e){ document.getElementById("output").innerHTML='<div class="panel"><span class="status st-failed">ERRO</span> '+esc(e.message)+'</div>'; toast("Erro: "+e.message,"err"); }
  finally{ btn.disabled=false; btn.textContent="Executar"; }
}

function render(res){
  lastResult = res; sevFilter = "all";
  const counts = {critical:0,high:0,medium:0,low:0,info:0};
  res.findings.forEach(f=>counts[f.severity]++);
  const total = res.findings.length;
  const bar = total ? '<div class="sevbar">'+SEV.map(s=>counts[s]?'<span style="width:'+(counts[s]/total*100).toFixed(1)+'%;background:'+SEVHEX[s]+'"></span>':'').join("")+'</div>' : '';
  const metrics = '<div class="metrics">'
    +'<div class="metric on" data-sev="all" onclick="setFilter(\'all\')"><div class="n">'+total+'</div><div class="l">total</div></div>'
    +SEV.map(s=>'<div class="metric" data-sev="'+s+'" onclick="setFilter(\''+s+'\')"><div class="n" style="color:'+SEVHEX[s]+'">'+counts[s]+'</div><div class="l">'+s+'</div></div>').join("")
    +'</div>';
  const cmd = res.command ? '<div class="cmd"><b>&gt;</b> '+esc(res.command)+'</div>' : '';
  const links = total ? '<div class="links" style="margin-top:14px">relatório: '
    +'<a href="/api/report/'+res.id+'?format=html" target="_blank">HTML</a>'
    +'<a href="/api/report/'+res.id+'?format=json" target="_blank">JSON</a>'
    +'<a href="/api/report/'+res.id+'?format=md" target="_blank">MD</a></div>' : '';
  document.getElementById("output").innerHTML='<div class="panel">'
    +'<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">'
    +'<span class="status st-'+res.status+'">'+res.status.toUpperCase()+'</span>'
    +'<strong class="mono">'+esc(res.connector)+'</strong><span style="color:var(--muted)" class="mono">→ '+esc(res.target)+'</span>'
    +(res.error?'<span style="color:var(--crit);font-size:.8rem" class="mono">'+esc(res.error)+'</span>':'')+'</div>'
    +cmd+bar+metrics+'<div id="flist"></div>'+links+'</div>';
  renderFindings();
}
function setFilter(s){
  sevFilter = (sevFilter===s)?"all":s;
  document.querySelectorAll('.metric').forEach(m=>m.classList.toggle('on', m.dataset.sev===sevFilter || (sevFilter==='all'&&m.dataset.sev==='all')));
  renderFindings();
}
function renderFindings(){
  if(!lastResult) return;
  const list = (sevFilter==="all"?lastResult.findings:lastResult.findings.filter(f=>f.severity===sevFilter))
    .slice().sort((a,b)=>SEV.indexOf(a.severity)-SEV.indexOf(b.severity));
  document.getElementById("flist").innerHTML = list.length ? list.map(f=>
    '<div class="finding"><span class="badge b-'+f.severity+'">'+f.severity+'</span>'
    +'<div><div class="f-title">'+esc(f.title)+'</div><div class="f-desc">'+esc(f.description||f.evidence||"")+'</div></div></div>').join("")
    : '<div class="empty">Nenhum achado'+(sevFilter!=="all"?" nesse filtro.":". Alvo limpo nessa verificação.")+'</div>';
}

async function loadGuide(){
  try{
    const data = await api("/api/guide");
    document.getElementById("guide").innerHTML = data.map(g=>'<div class="phase"><div class="num">'+g.ordem+'</div><div>'
      +'<h3>'+esc(g.titulo)+' <span class="tag '+(String(g.time).indexOf("Red")>=0?"red":"blue")+'">'+esc(g.time)+'</span></h3>'
      +'<p>'+esc(g.resumo)+'</p><p><b>Objetivo:</b> '+esc(g.objetivo)+'</p><p><b>Como ler:</b> '+esc(g.como_ler)+'</p>'
      +'<div class="tools">'+g.ferramentas.map(esc).join(" · ")+'</div></div></div>').join("");
  }catch(e){}
}

function statusColor(s){ return ({success:"#00ff9c",failed:"#ff2e6e",unavailable:"#637088",unauthorized:"#ff8a00",skipped:"#637088",partial:"#ffd400"})[s]||"#637088"; }
function switchView(name){
  ["operar","history","audit"].forEach(v=>{ document.getElementById("view-"+v).style.display = v===name?"block":"none"; });
  document.querySelectorAll(".nav-btn").forEach(b=> b.classList.toggle("on", b.dataset.view===name));
  if(name==="history") loadHistory();
  if(name==="audit") loadAudit();
}
async function loadHistory(){
  const v = document.getElementById("view-history");
  try{
    const data = await api("/api/history");
    if(!data.length){ v.innerHTML='<div class="empty">Nenhum scan nesta sessão — rode um em “Operar”.</div>'; return; }
    v.innerHTML = '<div class="panel">'+data.map(h=>'<div class="hrow"><span class="dot" style="background:'+statusColor(h.status)+'"></span>'
      +'<div style="flex:1"><strong class="mono">'+esc(h.connector)+'</strong> <span class="meta">→ '+esc(h.target)+'</span>'
      +'<div class="meta">'+h.total+' achado(s) · '+esc(h.status)+' · '+fmtTime(h.finished_at)+'</div></div>'
      +'<div class="links"><a href="/api/report/'+h.id+'?format=html" target="_blank">HTML</a><a href="/api/report/'+h.id+'?format=json" target="_blank">JSON</a></div></div>').join("")+'</div>';
  }catch(e){ v.innerHTML='<div class="empty">Erro ao carregar histórico.</div>'; }
}
async function loadAudit(){
  const v = document.getElementById("view-audit");
  try{
    const data = await api("/api/audit?limit=150");
    if(!data.length){ v.innerHTML='<div class="empty">Trilha de auditoria vazia.</div>'; return; }
    v.innerHTML = '<div class="panel"><div class="meta mono" style="margin-bottom:10px;color:var(--muted)">'+data.length+' evento(s) · mais recentes primeiro</div>'+data.map(a=>{
      const blocked=a.event==="blocked"; const color=blocked?"#ff2e6e":statusColor(a.status); const tags=[];
      if(blocked) tags.push('<span class="tag2 warn">bloqueado</span>');
      if(a.forced) tags.push('<span class="tag2 warn">forçado</span>');
      if(a.authorized===false && !blocked) tags.push('<span class="tag2 warn">fora do escopo</span>');
      if(a.authorized===true) tags.push('<span class="tag2 ok">autorizado</span>');
      return '<div class="hrow"><span class="dot" style="background:'+color+'"></span>'
        +'<div style="flex:1"><strong class="mono">'+esc(a.connector||a.event||"")+'</strong> <span class="meta">→ '+esc(a.target||"")+'</span>'
        +'<div class="meta">'+fmtTime(a.timestamp)+' · '+esc(a.user||"")+(a.status?(" · "+esc(a.status)):"")+'</div></div>'
        +'<div style="display:flex;gap:5px">'+tags.join("")+'</div></div>';
    }).join("")+'</div>';
  }catch(e){ v.innerHTML='<div class="empty">Erro ao carregar auditoria.</div>'; }
}

(async function init(){
  document.getElementById("connector").onchange = onConnectorChange;
  document.getElementById("run").onclick = runScan;
  document.getElementById("guideToggle").onclick = ()=>{ const el=document.getElementById("guide"); el.style.display = el.style.display==="none"?"block":"none"; };
  document.querySelectorAll(".nav-btn").forEach(b=> b.onclick=()=>switchView(b.dataset.view));
  let savedTheme="dark"; try{ savedTheme = localStorage.getItem("stg-theme")||"dark"; }catch(e){}
  applyTheme(savedTheme);
  document.getElementById("themeBtn").onclick = ()=> applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
  await loadScope(); await loadGuide();
  try{ CONNECTORS = await api("/api/connectors"); fillConnectors(); }
  catch(e){ document.getElementById("connector").innerHTML='<option>backend offline — abra via http://localhost:8000</option>'; }
})();
</script>
